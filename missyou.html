<!DOCTYPE html>
<html>
<head>
<title>For You 💖</title>
<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to right,#ff9eb5,#ffc3d1);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:white;
  padding:35px;
  border-radius:20px;
  width:90%;
  max-width:450px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.title{
  color:#ff2e63;
  font-weight:bold;
  font-size:28px;
  margin-bottom:15px;
}

.subtitle{
  margin-top:10px;
  font-size:16px;
  color:#000; /* black paragraph text */
  line-height:1.6;
  text-align:left;
}

button{
  margin-top:25px;
  padding:10px 22px;
  border:none;
  border-radius:25px;
  background:#ff2e63;
  color:white;
  font-size:14px;
  cursor:pointer;
}

button:hover{
  background:#e61e50;
}
</style>
</head>

<body>

<div class="card" id="content">
  <div class="title">Hey Beautiful 💖</div>
  <div class="subtitle">I miss you 💌</div>
  <button onclick="nextStep()">Let's Begin ✨</button>
</div>

<script>
let step = 0;

function nextStep(){
  step++;

  if(step === 1){
    // Page 2
    document.getElementById("content").innerHTML = `
      <div class="title">I Love You ❤️</div>
      <div class="subtitle">
        Emaan, tum bohat achi ho 💕. I can't imagine my life without you 😢.  
        Kabhi kabhi mein sochti hun ke tum nah hoti to life bohat different aur boring hoti 😜.  
        Tumhary hony sy aik sukoon hai ✨.  
        Aj mujhe last year ka time yad aya aur sab kuch sari mastiyan 😭😝.  
        Academy mein guzara hua sara time, wo memories jo mainy bnayi apky sath 🥰.  
        Mainy itna sab experience kiya aik saal mein tumhary sath, aur aisa maza kabhi kisi ke sath nahi aya jesa tery sath hony sy ata 😂.  
        Itna maza ata mujhe tery sath mil kr, sab ka mazak urana, nick names rkhna 😎.  
        Tu mujhe sab sy acha janti hai 💗.  
        Mein tujhe kuch nah btao to mujhe kuch hota hai 😆.  
        I misssss you so much yaar 😭❤️ kash time wapis sy peechy ja skta ⏳.  
        I lovee you meri aulad 😘💖.
      </div>
      <button onclick="nextStep()">Next ➜</button>
    `;
  }

  else if(step === 2){
    // Page 3
    document.getElementById("content").innerHTML = `
      <div class="title">I Love You ❤️</div>
      <div class="subtitle">
        Eman, mujhe tumhary mein sabse achi cheez lgti hai ky tum dil ki bohat achi ho 💕.  
        Tum dosron ka bohat khayal krti ho 😇 aur I wish ke tumhe hamesha tumhary jesy log hi milein 🌸.  
        Tumhari smile qayamat hai 😍 aur apny dil jesi hi pyari or khubsurat ho 🌷.  
        Tumhe pta, jab tum hasti ho itni pyariii lgti ho mashallah 😘.  
        Mujhe tumhari adat bohat achi lgti ky tum galat nahi sunti, tum aik dam perfect ho janu 😇✨.  
        Allah tumhe hamesha hasta rkhy aur kabhi tumhari smile gaib nahi ho 😍.  
        I love you so muchhhhh ❤️💖
      </div>
      <button onclick="nextStep()">Next ➜</button>
    `;
  }

  else if(step === 3){
    // Final Page
    document.getElementById("content").innerHTML = `
      <div class="title">I Miss You So Much 💖</div>
      <div class="subtitle">
        FINAL EMOTIONAL MESSAGE YAHAN LIKHNA 💌
      </div>
    `;
  }
}
</script>

</body>
</html>
